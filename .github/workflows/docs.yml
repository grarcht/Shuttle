name: Publish Dokka Docs

on:
  push:
    branches:
      - main

jobs:
  publish-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Dokka HTML
        run: |
          ./gradlew \
            :framework:dokkaGeneratePublicationHtml \
            :framework-integrations-persistence:dokkaGeneratePublicationHtml \
            :framework-integrations-extensions-room:dokkaGeneratePublicationHtml \
            :framework-addons-navigation-component:dokkaGeneratePublicationHtml

      - name: Assemble docs output
        run: |
          mkdir -p docs/framework
          mkdir -p docs/framework-integrations-persistence
          mkdir -p docs/framework-integrations-extensions-room
          mkdir -p docs/framework-addons-navigation-component
          cp -r framework/documentation/kotlin/.                              docs/framework/
          cp -r framework-integrations/persistence/documentation/kotlin/.     docs/framework-integrations-persistence/
          cp -r framework-integrations-extensions/room/documentation/kotlin/. docs/framework-integrations-extensions-room/
          cp -r framework-addons/navigation-component/documentation/kotlin/.  docs/framework-addons-navigation-component/

      - name: Deploy to gh-pages/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          target-folder: docs
          clean: false
